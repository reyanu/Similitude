name: iOS Build & TestFlight

# Manual trigger only — macOS runner minutes on a private repo bill at 10x,
# so builds run when requested (Actions → iOS Build & TestFlight → Run
# workflow), not on every push.
on:
  workflow_dispatch:
    inputs:
      deploy:
        description: "Upload to TestFlight"
        type: boolean
        default: false

# The runner's default Xcode is used deliberately: only the default Xcode on
# the macOS image has iOS simulator runtimes preinstalled, and pinning another
# version leaves tests with no eligible simulator destination.
env:
  SCHEME: Similitude

jobs:
  build-and-test:
    name: Build & Test (Simulator)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve Swift packages
        run: xcodebuild -resolvePackageDependencies -project Similitude.xcodeproj -scheme "$SCHEME"

      - name: Build (simulator, unsigned)
        run: |
          set -o pipefail
          xcodebuild build \
            -project Similitude.xcodeproj \
            -scheme "$SCHEME" \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO \
            | tee build.log | xcbeautify --renderer github-actions || (tail -100 build.log; exit 1)

      - name: Test (iPhone simulator)
        run: |
          set -o pipefail
          echo "=== Installed simulator runtimes ==="
          xcrun simctl list runtimes || true
          echo "=== Available iPhone simulators ==="
          xcrun simctl list devices available | grep -E "iPhone" || true
          echo "=== xcodebuild -showdestinations ==="
          xcodebuild -showdestinations -project Similitude.xcodeproj -scheme "$SCHEME" 2>&1 | tee destinations.txt || true

          # Prefer a destination xcodebuild itself declares eligible. The id
          # must be a full UUID so placeholder rows (id:dvtdevice-...) never match.
          UUID_RE="[0-9A-Fa-f]{8}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{12}"
          DEST_ID=$(grep "platform:iOS Simulator" destinations.txt | grep -v "error:" \
            | grep -oE "id:$UUID_RE" | head -1 | cut -d: -f2)
          # Fall back to the first available iPhone simulator from simctl.
          if [ -z "$DEST_ID" ]; then
            DEST_ID=$(xcrun simctl list devices available | grep -E "iPhone" | head -1 \
              | grep -oE "$UUID_RE")
          fi
          if [ -z "$DEST_ID" ]; then
            echo "No eligible iOS Simulator destination found"; exit 1
          fi
          echo "Using simulator destination: $DEST_ID"
          xcodebuild test \
            -project Similitude.xcodeproj \
            -scheme "$SCHEME" \
            -destination "id=$DEST_ID" \
            CODE_SIGNING_ALLOWED=NO \
            | tee test.log | xcbeautify --renderer github-actions || (tail -100 test.log; exit 1)

      - name: Preserve build logs
        if: always()
        # Log upload is best-effort; account storage quota must not fail CI.
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build.log
            test.log
          if-no-files-found: ignore

  testflight:
    name: Archive & Upload to TestFlight
    # Runs only when dispatched with deploy=true.
    if: ${{ inputs.deploy }}
    needs: build-and-test
    runs-on: macos-15
    environment: testflight
    env:
      DIST_CERT_PRESENT: ${{ secrets.DIST_CERT_P12_BASE64 != '' }}
      ASC_CONFIGURED: ${{ secrets.ASC_KEY_ID != '' && secrets.ASC_ISSUER_ID != '' && secrets.ASC_KEY_P8 != '' && secrets.APPLE_TEAM_ID != '' }}
    steps:
      - name: Check signing configuration
        if: ${{ env.ASC_CONFIGURED != 'true' }}
        run: |
          echo "::notice::TestFlight upload skipped — App Store Connect secrets (ASC_KEY_ID, ASC_ISSUER_ID, ASC_KEY_P8, APPLE_TEAM_ID) are not configured."

      - uses: actions/checkout@v4
        if: ${{ env.ASC_CONFIGURED == 'true' }}

      - name: Show Xcode version
        if: ${{ env.ASC_CONFIGURED == 'true' }}
        run: xcodebuild -version

      - name: Install XcodeGen
        if: ${{ env.ASC_CONFIGURED == 'true' }}
        run: brew install xcodegen

      - name: Generate Xcode project
        if: ${{ env.ASC_CONFIGURED == 'true' }}
        run: xcodegen generate

      - name: Write App Store Connect API key
        if: ${{ env.ASC_CONFIGURED == 'true' }}
        env:
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
        run: |
          mkdir -p ~/asc
          printf '%s' "$ASC_KEY_P8" > ~/asc/AuthKey.p8

      - name: Import distribution certificate (optional)
        if: ${{ env.ASC_CONFIGURED == 'true' && env.DIST_CERT_PRESENT == 'true' }}
        env:
          DIST_CERT_P12_BASE64: ${{ secrets.DIST_CERT_P12_BASE64 }}
          DIST_CERT_PASSWORD: ${{ secrets.DIST_CERT_PASSWORD }}
        run: |
          echo "$DIST_CERT_P12_BASE64" | base64 --decode > cert.p12
          security create-keychain -p ci-temp build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p ci-temp build.keychain
          security import cert.p12 -k build.keychain -P "$DIST_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k ci-temp build.keychain
          rm cert.p12

      - name: Archive
        if: ${{ env.ASC_CONFIGURED == 'true' }}
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -o pipefail
          xcodebuild archive \
            -project Similitude.xcodeproj \
            -scheme "$SCHEME" \
            -destination "generic/platform=iOS" \
            -archivePath build/Similitude.xcarchive \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/asc/AuthKey.p8 \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            | tee archive.log | xcbeautify --renderer github-actions || (tail -100 archive.log; exit 1)

      - name: Export & upload to TestFlight
        if: ${{ env.ASC_CONFIGURED == 'true' }}
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -o pipefail
          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store-connect</string>
            <key>destination</key><string>upload</string>
            <key>teamID</key><string>${APPLE_TEAM_ID}</string>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath build/Similitude.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/asc/AuthKey.p8 \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            | tee export.log | xcbeautify --renderer github-actions || (tail -100 export.log; exit 1)

      - name: Preserve archive logs
        if: ${{ always() && env.ASC_CONFIGURED == 'true' }}
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: archive-logs
          path: |
            archive.log
            export.log
          if-no-files-found: ignore
