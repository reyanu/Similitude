name: iOS Build & TestFlight

# Manual trigger only — macOS runner minutes on a private repo bill at 10x,
# so builds run when requested (Actions → iOS Build & TestFlight → Run
# workflow), not on every push.
on:
  workflow_dispatch:
    inputs:
      deploy:
        description: "Upload to TestFlight"
        type: boolean
        default: false

# The runner's default Xcode is used deliberately: only the default Xcode on
# the macOS image has iOS simulator runtimes preinstalled, and pinning another
# version leaves tests with no eligible simulator destination.
env:
  SCHEME: Similitude

jobs:
  build-and-test:
    name: Build & Test (Simulator)
    # macos-26: Apple requires the iOS 26 SDK for App Store uploads, so
    # build/test against the same toolchain the archive uses.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve Swift packages
        run: xcodebuild -resolvePackageDependencies -project Similitude.xcodeproj -scheme "$SCHEME"

      - name: Build (simulator, unsigned)
        run: |
          set -o pipefail
          xcodebuild build \
            -project Similitude.xcodeproj \
            -scheme "$SCHEME" \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO \
            | tee build.log | xcbeautify --renderer github-actions || (tail -100 build.log; exit 1)

      - name: Test (iPhone simulator)
        run: |
          set -o pipefail
          echo "=== Installed simulator runtimes ==="
          xcrun simctl list runtimes || true
          echo "=== Available iPhone simulators ==="
          xcrun simctl list devices available | grep -E "iPhone" || true
          echo "=== xcodebuild -showdestinations ==="
          xcodebuild -showdestinations -project Similitude.xcodeproj -scheme "$SCHEME" 2>&1 | tee destinations.txt || true

          # Prefer a destination xcodebuild itself declares eligible. The id
          # must be a full UUID so placeholder rows (id:dvtdevice-...) never match.
          UUID_RE="[0-9A-Fa-f]{8}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{12}"
          DEST_ID=$(grep "platform:iOS Simulator" destinations.txt | grep -v "error:" \
            | grep -oE "id:$UUID_RE" | head -1 | cut -d: -f2)
          # Fall back to the first available iPhone simulator from simctl.
          if [ -z "$DEST_ID" ]; then
            DEST_ID=$(xcrun simctl list devices available | grep -E "iPhone" | head -1 \
              | grep -oE "$UUID_RE")
          fi
          if [ -z "$DEST_ID" ]; then
            echo "No eligible iOS Simulator destination found"; exit 1
          fi
          echo "Using simulator destination: $DEST_ID"
          xcodebuild test \
            -project Similitude.xcodeproj \
            -scheme "$SCHEME" \
            -destination "id=$DEST_ID" \
            CODE_SIGNING_ALLOWED=NO \
            | tee test.log | xcbeautify --renderer github-actions || (tail -100 test.log; exit 1)

      - name: Preserve build logs
        if: always()
        # Log upload is best-effort; account storage quota must not fail CI.
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build.log
            test.log
          if-no-files-found: ignore

  testflight:
    name: Archive & Upload to TestFlight
    # Runs only when dispatched with deploy=true. Manual signing throughout,
    # mirroring the proven familylook-match pipeline: installed provisioning
    # profile + p12 in a dedicated keychain, manual export, altool upload
    # authenticated with the App Store Connect API key.
    if: ${{ inputs.deploy }}
    needs: build-and-test
    runs-on: macos-26
    environment: testflight
    env:
      BUNDLE_ID: com.rymoslite.similitude
      KEYCHAIN_NAME: app-signing.keychain-db
    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          missing=0
          for name in BUILD_CERTIFICATE_BASE64 BUILD_PROVISION_PROFILE_BASE64 P12_PASSWORD KEYCHAIN_PASSWORD ASC_API_KEY_BASE64 ASC_KEY_ID ASC_ISSUER_ID APPLE_TEAM_ID; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing GitHub Actions secret: ${name}"
              missing=1
            fi
          done
          exit "$missing"

      - name: Verify App Store Connect credentials
        # Fails in seconds instead of after a full build when the API key
        # trio is wrong or the base64 was mangled.
        env:
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          set -euo pipefail
          mkdir -p "${HOME}/private_keys"
          echo -n "$ASC_API_KEY_BASE64" | base64 --decode > "${HOME}/private_keys/AuthKey_${ASC_KEY_ID}.p8" \
            || { echo "::error::ASC_API_KEY_BASE64 is not valid base64 — re-encode the .p8 file"; exit 1; }
          head -1 "${HOME}/private_keys/AuthKey_${ASC_KEY_ID}.p8" | grep -q "BEGIN PRIVATE KEY" \
            || { echo "::error::Decoded ASC_API_KEY_BASE64 is not a .p8 private key (got: $(head -c 40 "${HOME}/private_keys/AuthKey_${ASC_KEY_ID}.p8" | tr -d '\n')…) — the secret is likely truncated or wrongly encoded"; exit 1; }
          echo "Key file decoded OK ($(wc -c < "${HOME}/private_keys/AuthKey_${ASC_KEY_ID}.p8") bytes)"
          xcrun altool --list-providers --apiKey "$ASC_KEY_ID" --apiIssuer "$ASC_ISSUER_ID" \
            || { echo "::error::Apple rejected the API key. Check ASC_KEY_ID matches the key the .p8 belongs to, ASC_ISSUER_ID is the Issuer ID from the same App Store Connect API page, and the key role is App Manager or Admin."; exit 1; }

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Install Apple signing assets
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          CERTIFICATE_PATH="${RUNNER_TEMP}/ios_distribution.p12"
          PROFILE_PATH="${RUNNER_TEMP}/similitude.mobileprovision"
          PROFILE_INSTALL_PATH="${HOME}/Library/MobileDevice/Provisioning Profiles"
          KEYCHAIN_PATH="${RUNNER_TEMP}/${KEYCHAIN_NAME}"
          PROFILE_PLIST="${RUNNER_TEMP}/profile.plist"

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"
          security cms -D -i "$PROFILE_PATH" > "$PROFILE_PLIST"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" "$PROFILE_PLIST")
          PROFILE_DISPLAY_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" "$PROFILE_PLIST")
          PROFILE_TEAM_ID=$(/usr/libexec/PlistBuddy -c "Print TeamIdentifier:0" "$PROFILE_PLIST")
          PROFILE_APP_ID=$(/usr/libexec/PlistBuddy -c "Print Entitlements:application-identifier" "$PROFILE_PLIST")

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          mkdir -p "$PROFILE_INSTALL_PATH"
          cp "$PROFILE_PATH" "${PROFILE_INSTALL_PATH}/${PROFILE_UUID}.mobileprovision"

          echo "Installed provisioning profile:"
          echo "  Name: ${PROFILE_DISPLAY_NAME}"
          echo "  UUID: ${PROFILE_UUID}"
          echo "  Team ID: ${PROFILE_TEAM_ID}"
          echo "  App ID: ${PROFILE_APP_ID}"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          echo "PROFILE_NAME=${PROFILE_DISPLAY_NAME}" >> "$GITHUB_ENV"
          echo "PROFILE_UUID=${PROFILE_UUID}" >> "$GITHUB_ENV"

      - name: Archive
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -o pipefail
          echo "Using TestFlight build number: ${GITHUB_RUN_NUMBER}"
          # Signing style/identity/profile live in the app target's Release
          # config (project.yml) so SPM package targets are never handed a
          # provisioning profile.
          xcodebuild archive \
            -project Similitude.xcodeproj \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "${RUNNER_TEMP}/Similitude.xcarchive" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CURRENT_PROJECT_VERSION="${GITHUB_RUN_NUMBER}" \
            OTHER_CODE_SIGN_FLAGS="--keychain ${RUNNER_TEMP}/${KEYCHAIN_NAME}" \
            | tee archive.log | xcbeautify --renderer github-actions || (tail -100 archive.log; exit 1)

      - name: Export IPA
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -o pipefail
          cat > "${RUNNER_TEMP}/ExportOptions.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${BUNDLE_ID}</key>
              <string>${PROFILE_NAME}</string>
            </dict>
          </dict>
          </plist>
          PLIST
          xcodebuild -exportArchive             -archivePath "${RUNNER_TEMP}/Similitude.xcarchive"             -exportPath "${RUNNER_TEMP}/export"             -exportOptionsPlist "${RUNNER_TEMP}/ExportOptions.plist"             | tee export.log | xcbeautify --renderer github-actions || (tail -100 export.log; exit 1)

      - name: Upload to TestFlight
        env:
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          set -euo pipefail
          mkdir -p "${HOME}/private_keys"
          echo -n "$ASC_API_KEY_BASE64" | base64 --decode > "${HOME}/private_keys/AuthKey_${ASC_KEY_ID}.p8"
          IPA_PATH="$(find "${RUNNER_TEMP}/export" -name '*.ipa' -maxdepth 1 | head -n 1)"
          echo "Uploading ${IPA_PATH}"
          xcrun altool --upload-app             --type ios             --file "$IPA_PATH"             --apiKey "$ASC_KEY_ID"             --apiIssuer "$ASC_ISSUER_ID"

      - name: Preserve archive logs
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: archive-logs
          path: |
            archive.log
            export.log
          if-no-files-found: ignore
