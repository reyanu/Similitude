name: Similitude
options:
  bundleIdPrefix: com.rymoslite
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
packages:
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation
    from: 0.9.19
targets:
  Similitude:
    type: application
    platform: iOS
    sources:
      - path: Similitude
    dependencies:
      - package: ZIPFoundation
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rymoslite.similitude
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Similitude
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_NSCameraUsageDescription: >-
          Similitude uses the camera to capture family portraits.
          Photos are processed privately on your device and never leave your phone.
        INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: >-
          Similitude saves your exported keepsakes and portraits to your photo library.
        CODE_SIGN_STYLE: Automatic
  SimilitudeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SimilitudeTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.rymoslite.similitude.tests
    dependencies:
      - target: Similitude
      - package: ZIPFoundation
schemes:
  Similitude:
    build:
      targets:
        Similitude: all
    test:
      targets:
        - SimilitudeTests
